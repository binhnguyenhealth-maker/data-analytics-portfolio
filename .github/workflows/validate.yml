name: validate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  portfolio-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Regenerate synthetic data
        run: python shared/validation/regenerate_all.py
      - name: Run analytical and release tests
        run: python shared/validation/run_all_tests.py
